<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Management</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >
</head>
<body class="p-4 bg-light">

  <div class="container">
    <h1 class="mb-4">Customer Management</h1>

    <!-- Add New Customer -->
    <div class="card mb-5">
      <div class="card-body">
        <h5 class="card-title">Add New Customer</h5>
        <form id="customer-form">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" name="customerFirstName" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" name="customerLastName" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" name="customerEmail">
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-control" name="customerPhoneNumber">
            </div>
            <div class="col-md-6">
              <label class="form-label">Vehicle No.</label>
              <input type="text" class="form-control" name="vehicleNumbeString">
            </div>
          </div>
          <button type="submit" class="btn btn-success mt-3">Save Customer</button>
        </form>
        <div id="msg" class="mt-2"></div>
      </div>
    </div>

  <script>
    const form = document.getElementById('customer-form');
    const table = document.querySelector('#customer-table tbody');
    const msg   = document.getElementById('msg');

    // Load existing customers
    function load() {
      fetch('/customer')
        .then(r => r.json())
        .then(list => {
          table.innerHTML = '';
          list.forEach(c => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${c.customerId}</td>
              <td>${c.customerName}</td>
              <td>${c.customerEmail||''}</td>
              <td>${c.customerPhoneNumber||''}</td>
              <td>${c.vehicleNumbeString||''}</td>
            `;
            table.appendChild(row);
          });
        });
    }

    // Handle submit
    form.addEventListener('submit', e => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      fetch('/customer', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      })
      .then(r => {
        if (!r.ok) throw new Error();
        return r.text();
      })
      .then(txt => {
        msg.textContent = txt;
        msg.style.color = 'green';
        form.reset();
        load();
      })
      .catch(() => {
        msg.textContent = 'Failed to save customer.';
        msg.style.color = 'red';
      });
    });

    document.addEventListener('DOMContentLoaded', load);
  </script>
</body>
</html>
